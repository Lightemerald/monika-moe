<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/7762615fd1.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Quicksand:400,700&display=swap">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" type="text/css" href="./css/style.css">
    <link rel="icon" type="image/x-icon" href="./img/icon.png">
    <title>Monika Moe</title>

</head>

<body>

    <!-- Navbar (sit on top) -->
    <div id="top-menu" class="w3-top w3-animate-opacity">
        <div class="w3-bar w3-padding-16" id="myNavbar">
            <a href="/" class="w3-bar-item w3-button w3-margin-left brand-text">
                <i class="fa-solid fa-heart"></i> Monika.moe
            </a>
            <a class="w3-bar-item w3-button w3-right w3-hide-large w3-hide-medium mobile-menu-btn" onclick="toggleAppMenu()"
                title="Toggle Menu"><i class="fa-solid fa-bars"></i></a>
            <a href="https://trap.moe/" target="_blank" rel="noopener noreferrer" class="w3-bar-item w3-button w3-hide-small w3-right"><i
                    class="fa-solid fa-cat"></i> TRAP.MOE</a>
            <a href="https://git.justw.tf/" target="_blank" rel="noopener noreferrer" class="w3-bar-item w3-button w3-hide-small w3-right"><i
                    class="fa-brands fa-git-alt"></i> MY OWN GIT</a>
            <a href="https://emerald.bot/" target="_blank" rel="noopener noreferrer" class="w3-bar-item w3-button w3-hide-small w3-right"><i
                    class="fa-solid fa-robot"></i> EMERALD BOT</a>
            <a href='https://emerald.moe/' target="_blank" rel="noopener noreferrer" class='w3-bar-item w3-button w3-hide-small w3-right'><i
                    class='fa-solid fa-gem'></i> EMERALD.MOE</a>
        </div>

    </div>

    <!-- AppMenu (Mobile Fullscreen) -->
    <div id="appMenu" class="w3-bar-block w3-hide fullscreen-nav" onclick="toggleAppMenu()">
        <div class="mobile-menu-content" onclick="event.stopPropagation()">
            <a href="https://emerald.moe/" target="_blank" rel="noopener noreferrer" class="w3-bar-item w3-button w3-hover-pink"><i
                    class="fa-solid fa-gem"></i> EMERALD.MOE</a>
            <a href="https://emerald.bot/" target="_blank" rel="noopener noreferrer" class="w3-bar-item w3-button w3-hover-pink"><i
                    class="fa-solid fa-robot"></i> EMERALD BOT</a>
            <a href="https://git.justw.tf/" target="_blank" rel="noopener noreferrer" class="w3-bar-item w3-button w3-hover-pink"><i class="fa-brands fa-git-alt"></i> MY OWN GIT</a>
            <a href="https://trap.moe/" target="_blank" rel="noopener noreferrer" class="w3-bar-item w3-button w3-hover-pink"><i
                    class="fa-solid fa-cat"></i> TRAP.MOE</a>
            <button class="w3-button w3-pink w3-margin-top w3-round-large" style="border-radius:20px !important" onclick="toggleAppMenu()">CLOSE</button>
        </div>
    </div>

    <section id="imgdiv" class="w3-center w3-container w3-card-4 w3-animate-opacity imgdiv">
        <img id="image" src="./img/loading.gif" alt="The best girl" onclick="toggleFullscreen()"><br>
        <div class="w3-center">
            <button id="srcbtn"
                class="w3-button w3-ripple w3-round-large w3-border w3-border-green w3-text-green w3-hover-green w3-hover-text-white btn-anim"
                onclick="toggleSRC()" type="button" value="api">CURATED</button>
            <button id="sfwbtn"
                class="w3-button w3-ripple w3-round-large w3-border w3-border-green w3-text-green w3-hover-green w3-hover-text-white btn-anim w3-margin-left w3-center"
                onclick="toggleSFW()" type="button" value="0">SFW</button>
            <button id="likebtn" class="w3-button w3-ripple w3-round-large w3-blue w3-margin-left w3-hide" type="button"
                disabled><i class="fa-solid fa-thumbs-up"></i></button>
            <button id="dislikebtn" class="w3-button w3-ripple w3-round-large w3-red w3-margin-left w3-hide" type="button"
                disabled><i class="fa-solid fa-thumbs-down"></i></button>
            <button id="nextbtn" class="w3-button w3-ripple w3-round-large w3-green w3-margin-left" type="button"
                onclick="fetchMonika()"><i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </section>

    <div id="boxBack">
        <div class="w3-center w3-animate-opacity w3-border" id="boxWrap">
            <div id="boxTxt"></div>
            <input id="btnTxt" class="w3-btn w3-border" type="button" value="OK" onclick="dbox()" />
        </div>
    </div>

    <script src="./scripts/script.js"></script>

</body>

<!-- Footer -->
<footer class="w3-center w3-animate-opacity footer">
    <p class="footer-text">Made by your one and only Silly Hikari 💚</p>
    <p class="footer-text">&copy; Monika.moe
        <script>
            document.write(new Date().getFullYear());
        </script>
    </p>
</footer>

</html>
