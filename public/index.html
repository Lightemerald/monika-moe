<!DOCTYPE html>
<html lang="en">

    <head>

        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://kit.fontawesome.com/7762615fd1.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
        <link rel="stylesheet" type="text/css" href="./css/style.css">
        <link rel="icon" type="image/x-icon" href="./img/icon.png">
        <title>Monika Moe</title>

    </head>

    <body>

    <!-- Navbar (sit on top) -->
    <div id="top-menu" class="w3-top w3-animate-opacity">
      <div class="w3-bar w3-padding-16" id="myNavbar">
        <a class="w3-bar-item w3-button w3-hover-black w3-margin-left" onclick="toggleAppMenu()" title="Toggle App Menu"><i class="fa-solid fa-th"></i></a>
        <a href="https://cloud.aostia.net/" class="w3-bar-item w3-button w3-hide-small w3-right"><i class="fa-solid fa-cloud"></i> AOSTIA CLOUD</a>
        <a href="https://mail.aostia.net/" class="w3-bar-item w3-button w3-hide-small w3-right"><i class="fa-solid fa-envelope"></i> AOSTIA MAIL</a>
        <a href='https://aostia.com/' class='w3-bar-item w3-button w3-hide-small w3-right'><i class='fa fa-home'></i> AOSTIA HOME</a>
      </div>
      
      <!-- AppMenu -->
      <div id="appMenu" class="w3-bar-block w3-left w3-hide" style="border-radius: 10px; background-color:#101010; padding: 10px;">
        <a href="https://aostia.com/" class="w3-bar-item w3-button w3-hide-large" onclick="toggleFunction()"><i class="fa-solid fa-house"></i> AOSTIA</a>
        <a href="https://mail.aostia.net/" class="w3-bar-item w3-button w3-hide-large" onclick="toggleFunction()"><i class="fa-solid fa-envelope"></i> AOSTIA MAIL</a>
        <a href="https://cloud.aostia.net/" class="w3-bar-item w3-button w3-hide-large" onclick="toggleFunction()"><i class="fa-solid fa-cloud"></i> AOSTIA CLOUD</a>
        <a href="https://cuzwhynot.com/" class="w3-bar-item w3-button" onclick="toggleFunction()"><i class="fa-solid fa-link"></i> CUZWHYNOT</a>
        <a href="https://kunzite.me/" class="w3-bar-item w3-button" onclick="toggleFunction()"><i class="fa-solid fa-music"></i> KUNZITE.ME</a>
        <a href="https://emerald.moe/" class="w3-bar-item w3-button" onclick="toggleFunction()"><i class="fa-regular fa-gem"></i> EMERALD BOT</a>
      </div>
    
    </div>

    <section id="imgdiv" class="w3-display-middle w3-center w3-container w3-card-4 w3-animate-opacity imgdiv">
        <img id="image" src="./img/loading.gif" alt="The best girl" onclick="closeMenu()"><br>
        <div class="w3-center"> 
          <button id="srcbtn" class="w3-button w3-ripple w3-round-large w3-border w3-border-green w3-text-green w3-hover-green w3-hover-text-white btn-anim" onclick="toggleSRC()" type="button" value="api">API</button>
          <button id="sfwbtn" class="w3-button w3-ripple w3-round-large w3-border w3-border-green w3-text-green w3-hover-green w3-hover-text-white btn-anim w3-margin-left w3-center" onclick="toggleSFW()" type="button" value="0">SFW</button>
          <button id="likebtn" class="w3-button w3-ripple w3-round-large w3-blue w3-margin-left" type="button" disabled><i class="fa-solid fa-thumbs-up"></i></button>
          <button id="dislikebtn" class="w3-button w3-ripple w3-round-large w3-red w3-margin-left" type="button" disabled><i class="fa-solid fa-thumbs-down"></i></button>
          <button id="nextbtn" class="w3-button w3-ripple w3-round-large w3-green w3-margin-left" type="button" onclick="fetchMonika()"><i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </section>

    <div id="boxBack">
        <div class="w3-center w3-animate-opacity w3-border" id="boxWrap">
            <div id="boxTxt"></div>
            <input id="btnTxt" class="w3-btn w3-border" type="button" value="OK" onclick="dbox()"/>
        </div>
    </div>

    <script src="./scripts/script.js"></script>

    </body>
    
    <!-- Footer -->
    <footer class="w3-center w3-animate-opacity footer">
        <p class="footer-text">&copy; Monika.moe
            <script>
                document.write(new Date().getFullYear());
            </script>
        </p>
    </footer>

</html>
